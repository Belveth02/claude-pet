<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"></stop>
      <stop offset="100%" stop-color="#ffffff"></stop>
    </linearGradient>

    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb347"></stop>
      <stop offset="100%" stop-color="#ff6b00"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"></rect>

  <!-- Stars -->
  <g fill="#ffb300">
    <rect x="120" y="90" width="12" height="36"></rect>
    <rect x="108" y="102" width="36" height="12"></rect>

    <rect x="170" y="110" width="8" height="24"></rect>
    <rect x="162" y="118" width="24" height="8"></rect>

    <rect x="95" y="145" width="8" height="24"></rect>
    <rect x="87" y="153" width="24" height="8"></rect>
  </g>

  <!-- Left claw -->
  <g stroke="#4a1200" stroke-width="6">
    <path d="M95 240 L70 215 L70 175 L95 150 L120 150 L145 175 L145 200 L120 225 L145 250 L145 275 L120 300 L85 300 L60 275 L60 240 Z" fill="url(#orange)"></path>
  </g>

  <!-- Right claw -->
  <g stroke="#4a1200" stroke-width="6">
    <path d="M417 240 L442 215 L442 175 L417 150 L392 150 L367 175 L367 200 L392 225 L367 250 L367 275 L392 300 L427 300 L452 275 L452 240 Z" fill="url(#orange)"></path>
  </g>

  <!-- Body -->
  <rect x="145" y="165" width="222" height="150" fill="url(#orange)" stroke="#4a1200" stroke-width="8"></rect>

  <!-- Top blocks -->
  <rect x="170" y="145" width="45" height="20" fill="#ff9a2e" stroke="#4a1200" stroke-width="6"></rect>

  <rect x="225" y="145" width="45" height="20" fill="#ff9a2e" stroke="#4a1200" stroke-width="6"></rect>

  <rect x="280" y="145" width="45" height="20" fill="#ff9a2e" stroke="#4a1200" stroke-width="6"></rect>

  <rect x="335" y="145" width="32" height="20" fill="#ff9a2e" stroke="#4a1200" stroke-width="6"></rect>

  <!-- Eyes -->
  <path d="M200 235 L180 220 L180 250 Z" fill="#111"></path>
  <path d="M312 235 L332 220 L332 250 Z" fill="#111"></path>

  <!-- Legs -->
  <g fill="#ff7a00" stroke="#4a1200" stroke-width="6">
    <rect x="175" y="315" width="20" height="55"></rect>
    <rect x="225" y="315" width="20" height="55"></rect>
    <rect x="275" y="315" width="20" height="55"></rect>
    <rect x="325" y="315" width="20" height="55"></rect>
  </g>

  <!-- Shadow -->
  <ellipse cx="256" cy="385" rx="120" ry="14" fill="#000" opacity="0.08"></ellipse>

  <!-- Text -->
  <g font-family="monospace" font-weight="900" font-size="34" fill="#2b0d00">
    <text x="256" y="445" text-anchor="middle">
      &lt;CLAUDE CODE&gt;
    </text>
  </g>

  <!-- Side arrows -->
  <text x="75" y="445" font-family="monospace" font-size="42" font-weight="bold" fill="#ff7a00">&lt;</text>

  <text x="430" y="445" font-family="monospace" font-size="42" font-weight="bold" fill="#ff7a00">&gt;</text>
</svg>